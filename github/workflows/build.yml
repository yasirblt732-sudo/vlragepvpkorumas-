name: Build PvPProtection Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Maven ile Derle
        run: mvn clean package -q

      - name: JAR Dosyasını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: PvPProtection-1.0.0
          path: target/PvPProtection-1.0.0.jar
          retention-days: 30 
