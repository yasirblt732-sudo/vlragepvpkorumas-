name: PvPProtection
version: 1.0.0
main: com.pvpprotection.PvPProtection
api-version: 1.20
description: 30 dakika PvP koruma sistemi
author: PvPProtection
commands:
  pvpprotect:
    description: PvP korumasını yönet
    usage: /pvpprotect [reload]
    permission: pvpprotection.admin
permissions:
  pvpprotection.admin:
    description: Admin komutlarına erişim
    default: op
  pvpprotection.bypass:
    description: PvP korumasını atla
    default: false
