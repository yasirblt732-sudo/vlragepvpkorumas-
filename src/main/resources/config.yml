# PvP Koruma Konfigürasyonu
protection:
  # Koruma süresi (dakika cinsinden)
  duration-minutes: 30
  
  # Action bar güncelleme aralığı (tick, 20 tick = 1 saniye)
  update-interval-ticks: 20

messages:
  # Koruma aktif olduğunda mesaj (action bar'da görünür)
  active-line1: "&5&l✦ PVP KORUMASI AKTİF ✦"
  active-line2: "&d⏱ %time% kaldı"
  
  # Koruma bittiğinde mesaj
  expired-actionbar: "&4&l⚔ PVP KORUMASI SONA ERDİ ⚔"
  expired-chat: "&c&lDikkat! &7PvP koruman sona erdi, artık saldırıya açıksın!"
  
  # Saldırı engellendi mesajı
  attack-blocked: "&c⚔ %target% henüz PvP koruması altında! (%time% kaldı)"
  receive-blocked: "&a✦ PvP koruması saldırıyı engelledi! (%time% kaldı)"
  
  # Koruması biten oyuncuya saldırı girişimi
  attacker-protected: "&cSen de hâlâ PvP koruması altındasın!" 
