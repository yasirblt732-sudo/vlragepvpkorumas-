name: Build PvPProtection Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: JAR içeriğini kontrol et
        run: |
          mvn clean package -q
          echo "=== JAR içeriği ==="
          jar tf target/PvPProtection-1.0.0.jar
      - uses: actions/upload-artifact@v4
        with:
          name: PvPProtection-1.0.0
          path: target/PvPProtection-1.0.0.jar
          retention-days: 30
